waypoint_follower:
  ros__parameters:
    # Absolute path to the CSV file containing waypoints.
    # CSV format (one waypoint per row, no header):
    #   x, y, qx, qy, qz, qw
    # Lines starting with '#' and empty lines are ignored.
    waypoints_csv: "/home/alexios/Projects/mivia_rover/src/mivia_rover_waypoint_follower/waypoints/trajectory_pillola_stretta.csv"

    # NAV2 controller server parameters — must match mivia_rover_nav2_config.yaml
    controller_id: "FollowPath"
    goal_checker_id: "general_goal_checker"
    odom_topic: "/odometry/filtered"

    # Maximum Euclidean distance (m) between first and last waypoint to consider
    # the trajectory circular.
    circular_threshold: 0.5

    # For circular trajectories, keep a temporary goal that stays ahead on the
    # loop without landing exactly on the opposite side of the oval, otherwise
    # the controller may prefer stopping when the Euclidean distance to that
    # temporary endpoint starts increasing again.
    circular_loops_ahead: 0.25
